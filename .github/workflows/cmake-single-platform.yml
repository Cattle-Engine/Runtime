name: Build and Release

on:
  push:
    branches: [ "main" ]

jobs:
  build-linux:
    name: 🐧 Build (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake clang pkg-config \
            libvulkan-dev vulkan-tools \
            shaderc glslang-tools \
            python3 xxd

      - name: Build SDL3
        run: |
          git clone https://github.com/libsdl-org/SDL.git
          cd SDL
          cmake -S . -B build
          cmake --build build
          sudo cmake --install build
          sudo ldconfig

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Package
        run: |
          mkdir dist
          cp build/ce_engine dist/ce_engine-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/

  build-windows:
    name: 🪟 Build (MinGW)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW
        run: choco install mingw -y

      - name: Add MinGW to PATH
        run: echo "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin" >> $env:GITHUB_PATH

      - name: Install Vulkan SDK
        run: choco install vulkan-sdk -y

      - name: Build SDL3
        run: |
          git clone https://github.com/libsdl-org/SDL.git
          cd SDL
          cmake -S . -B build -G "MinGW Makefiles"
          cmake --build build
          cmake --install build

      - name: Configure
        run: cmake -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Package
        run: |
          mkdir dist
          copy build\ce_engine.exe dist\ce_engine-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/

  release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: auto-${{ github.run_number }}
          name: Auto Build ${{ github.run_number }}
          files: |
            linux-build/ce_engine-linux
            windows-build/ce_engine-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
